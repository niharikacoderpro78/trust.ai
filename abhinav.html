<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me, Abhinav? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff8fab,#f47296);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    animation:float 8s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120px);
        opacity:1;
    }
}

.card{
    width:600px;
    max-width:90%;
    background:rgba(145,61,89,.95);
    backdrop-filter:blur(10px);
    color:white;
    text-align:center;
    padding:35px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.cute-gif{
    width:220px;
    border-radius:20px;
    margin-bottom:15px;
}

.card h1{
    font-size:38px;
    margin-bottom:15px;
}

.card p{
    font-size:24px;
    min-height:80px;
    margin-bottom:25px;
}

#yesBtn{
    border:none;
    background:#ff165d;
    color:white;
    font-size:22px;
    padding:15px 45px;
    border-radius:14px;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

#yesBtn:hover{
    transform:scale(1.05);
}

#noBtn{
    position:absolute;
    border:none;
    background:#333;
    color:white;
    font-size:20px;
    padding:15px 25px;
    border-radius:14px;
    cursor:pointer;
    transition:.15s;
}

.success{
    display:none;
}

.success h1{
    font-size:55px;
    margin-bottom:20px;
}

.success p{
    font-size:28px;
    line-height:1.5;
}

.confetti{
    position:absolute;
    width:12px;
    height:12px;
    animation:fall 4s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}
</style>
</head>
<body>

<div class="hearts"></div>

<div class="card">

    <div id="proposal">

        <img
        src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
        class="cute-gif"
        alt="Cute Cat">

        <h1>💖 Will You Go On A Date With Me, Sagar? 💖</h1>

        <p id="message">
            I promise it'll be fun ❤️
        </p>

        <button id="yesBtn">
            YES 💘
        </button>

    </div>

    <div class="success" id="success">

        <h1>🥳 YAYYYYY ❤️</h1>

        <p>
            You said YES!! 💕<br><br>

            Now get ready for the cutest date ever 🌹🥰✨
            <br><br>

            Can't wait ❤️
        </p>

    </div>

</div>

<button id="noBtn">NO 🙈</button>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

const messages = [
    "Please say yes 🥺",
    "Pretty please? 💕",
    "Just one date 👉👈",
    "I'll cry 😭",
    "Look at the cat... even it wants you to say yes 🐱❤️",
    "Don't break my heart 💔",
    "You're making me nervous 😳",
    "Pleaseeeee Sagar 🥹",
    "I'm literally begging now 🙏😭",
    "My heart can't take this 😭💔",
    "Last chance... 🥺",
    "Okay fine... I'm disappearing 😔"
];

let count = 0;

moveNoButton();

function moveNoButton(){

    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 100;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
}

function dodgeNo(){

    if(count < messages.length){
        message.innerHTML = messages[count];
    }

    count++;

    moveNoButton();

    let current =
    parseFloat(window.getComputedStyle(yesBtn).fontSize);

    yesBtn.style.fontSize =
    (current + 4) + "px";

    yesBtn.style.padding =
    (15 + count * 2) + "px " +
    (45 + count * 5) + "px";

    if(count >= messages.length){

        noBtn.style.display = "none";

        message.innerHTML =
        "The NO button resigned from its job 😌❤️";
    }
}

noBtn.addEventListener("mouseover", dodgeNo);
noBtn.addEventListener("click", dodgeNo);

yesBtn.addEventListener("click", ()=>{

    document.getElementById("proposal").style.display="none";
    document.getElementById("success").style.display="block";

    noBtn.style.display="none";

    createConfetti();
});

function createConfetti(){

    for(let i=0;i<200;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100+"vw";

        confetti.style.background =
        `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

const heartsContainer =
document.querySelector(".hearts");

setInterval(()=>{

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML =
    Math.random() > 0.5 ? "❤️" : "💕";

    heart.style.left =
    Math.random()*100+"vw";

    heart.style.fontSize =
    (Math.random()*25+15)+"px";

    heart.style.animationDuration =
    (Math.random()*4+5)+"s";

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },9000);

},400);

</script>

</body>
</html>
