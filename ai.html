<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f47296;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Floating Hearts */
.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 8s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120px);
        opacity:1;
    }
}

.card{
    width:550px;
    max-width:90%;
    background:#9d4b60;
    color:white;
    text-align:center;
    padding:40px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.card h1{
    font-size:42px;
    margin-bottom:20px;
}

.card p{
    font-size:26px;
    margin-bottom:30px;
    min-height:70px;
}

#yesBtn{
    border:none;
    background:#ff165d;
    color:white;
    font-size:22px;
    padding:15px 45px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

#yesBtn:hover{
    transform:scale(1.05);
}

#noBtn{
    position:absolute;
    background:#2c2c2c;
    color:white;
    border:none;
    font-size:20px;
    padding:15px 30px;
    border-radius:12px;
    cursor:pointer;
    transition:.15s;
}

.success{
    display:none;
}

.success h1{
    font-size:60px;
    margin-bottom:20px;
}

.success p{
    font-size:30px;
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall 4s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}
</style>
</head>
<body>

<div class="hearts"></div>

<div class="card" id="card">

    <div id="proposal">

        <h1>💖 Will You Go On A Date With Me?</h1>

        <p id="message">
            I promise it'll be fun ❤️
        </p>

        <button id="yesBtn">
            YES 💘
        </button>

    </div>

    <div class="success" id="success">

        <h1>🎉 YAYYYY! 🎉</h1>

        <p>
            Date Confirmed ❤️🥰
            <br><br>
            Best decision ever!
        </p>

    </div>

</div>

<button id="noBtn">NO 🙄</button>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

const messages = [
    "Please say yes 🥺",
    "Come on... just one date ❤️",
    "Pretty please? 💕",
    "I'll cry 😭",
    "You're making this difficult 😅",
    "My heart can't take this 💔",
    "This is getting embarrassing 😳",
    "The NO button is broken anyway 🤭",
    "You know you want to 😏",
    "JUST CLICK YES ❤️"
];

let count = 0;

/* Initial NO position */
moveNoButton();

function moveNoButton(){

    const maxX = window.innerWidth - 140;
    const maxY = window.innerHeight - 80;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
}

function dodgeNo(){

    moveNoButton();

    if(count < messages.length){
        message.innerHTML = messages[count];
    }else{
        message.innerHTML =
        "Why are you still trying to click NO? 😂";
    }

    count++;

    let current =
        parseFloat(
            window.getComputedStyle(yesBtn)
            .fontSize
        );

    yesBtn.style.fontSize =
        (current + 4) + "px";

    yesBtn.style.padding =
        (15 + count * 2) + "px " +
        (45 + count * 5) + "px";
}

noBtn.addEventListener("mouseover", dodgeNo);
noBtn.addEventListener("click", dodgeNo);

yesBtn.addEventListener("click", ()=>{

    document.getElementById("proposal").style.display="none";
    document.getElementById("success").style.display="block";
    noBtn.style.display="none";

    createConfetti();
});

function createConfetti(){

    for(let i=0;i<150;i++){

        const confetti =
            document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
            Math.random()*100+"vw";

        confetti.style.background =
            `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.animationDuration =
            (Math.random()*3+2)+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

/* Floating hearts */
const heartsContainer =
document.querySelector(".hearts");

setInterval(()=>{

    const heart =
        document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random()*100+"vw";

    heart.style.fontSize =
        (Math.random()*25+15)+"px";

    heart.style.animationDuration =
        (Math.random()*4+5)+"s";

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },9000);

},500);

</script>

</body>
</html>
